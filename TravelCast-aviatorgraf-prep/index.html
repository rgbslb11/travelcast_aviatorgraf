<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TravelCast AviatorGraf Prep</title>
  <link rel="stylesheet" href="./css/app.css">
  <link rel="stylesheet" href="./css/cards.css">
  <link rel="stylesheet" href="./css/graphics-preview.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>TravelCast AviatorGraf Prep</h1>
      <p>Ontology-backed aviation, weather, and route intelligence for broadcast-ready graphics.</p>
    </div>
    <div id="mode-banner" class="mode-banner">Loading...</div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="airport-board" class="active">Airport Status Board</button>
    <button data-tab="airport-detail">Airport Detail / Graphics Prep</button>
    <button data-tab="aviation-hazards">Aviation Hazards</button>
    <button data-tab="faa-ops">ATCSCC / FAA Ops Plan</button>
    <button data-tab="routecast">RouteCast</button>
    <button data-tab="graphics-queue">Graphics Queue</button>
    <button data-tab="source-health">Source Health</button>
  </nav>

  <main>
    <section id="airport-board" class="tab-panel active"></section>
    <section id="airport-detail" class="tab-panel"></section>
    <section id="aviation-hazards" class="tab-panel"></section>
    <section id="faa-ops" class="tab-panel"></section>
    <section id="routecast" class="tab-panel"></section>
    <section id="graphics-queue" class="tab-panel"></section>
    <section id="source-health" class="tab-panel"></section>
  </main>

  <footer>
    <strong>Source doctrine:</strong> FAA/NAS/ATCSCC = operational truth. NWS forecast impact = proxy. AviationWeather = aviation weather truth. Commercial sources = enrichment.
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
